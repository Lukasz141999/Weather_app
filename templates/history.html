<!DOCTYPE html>
<html>
<head>
    <title>Weather history</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
<h1>Weather history</h1>

<table>
    <thead>
        <tr>
            <th>City</th>
            <th>Temperature (°C)</th>
            <th>Humidity (%)</th>
            <th>Description</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for row in weather_history %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/">← Back</a>
</div>

</body>
</html>
