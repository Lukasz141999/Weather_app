version: "3.9"

services:

  web:
    build: .
    container_name: weather_app
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - weather_network

  postgres:
    image: postgres:15
    container_name: weather_db
    restart: always
    env_file:
      .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - weather_network

volumes:
  postgres_data:

networks:
  weather_network: